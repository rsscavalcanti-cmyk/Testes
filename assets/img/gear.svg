<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Marca WZ Montagens">
  <g fill="none" stroke="#8a8d92" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- gear teeth + body -->
    <g transform="translate(100,100)">
      <g id="teeth">
        <rect x="-9" y="-78" width="18" height="22" rx="3" fill="#8a8d92" stroke="none"/>
      </g>
      <use href="#teeth" transform="rotate(45)"/>
      <use href="#teeth" transform="rotate(90)"/>
      <use href="#teeth" transform="rotate(135)"/>
      <use href="#teeth" transform="rotate(180)"/>
      <use href="#teeth" transform="rotate(225)"/>
      <use href="#teeth" transform="rotate(270)"/>
      <use href="#teeth" transform="rotate(315)"/>
      <circle cx="0" cy="0" r="58"/>
      <circle cx="0" cy="0" r="40"/>
      <!-- center swirl -->
      <path d="M 14 -2 A 16 16 0 1 0 8 11" />
    </g>
    <!-- rotation arrows -->
    <g stroke-width="5">
      <path d="M 38 70 A 66 66 0 0 1 120 26"/>
      <path d="M 120 26 L 108 22 M 120 26 L 116 38"/>
      <path d="M 162 130 A 66 66 0 0 1 80 174"/>
      <path d="M 80 174 L 92 178 M 80 174 L 84 162"/>
