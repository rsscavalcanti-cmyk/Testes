<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 270" width="520" height="270" role="img" aria-label="WZ Montagens">
  <defs>
    <linearGradient id="wzSilver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9e9ec"/>
      <stop offset="45%" stop-color="#9a9da3"/>
      <stop offset="100%" stop-color="#5b5e66"/>
    </linearGradient>
    <linearGradient id="wzInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2c31"/>
      <stop offset="100%" stop-color="#0e0f12"/>
    </linearGradient>
  </defs>

  <!-- Gear + rotation arrows mark -->
  <g transform="translate(95,95)" fill="none" stroke="#3a3d44" stroke-width="7" stroke-linecap="round">
    <!-- rotation arrows -->
    <path d="M -70 -8 A 72 72 0 0 1 18 -66" />
    <path d="M 18 -78 L 18 -66 L 6 -60" stroke-linejoin="round"/>
    <path d="M 70 8 A 72 72 0 0 1 -18 66" />
    <path d="M -18 78 L -18 66 L -6 60" stroke-linejoin="round"/>
  </g>
  <!-- gear -->
  <g transform="translate(95,95)" fill="#2f323a">
    <g>
      <circle cx="0" cy="0" r="34"/>
      <g>
        <rect x="-6" y="-50" width="12" height="20" rx="2"/>
        <rect x="-6" y="30" width="12" height="20" rx="2"/>
        <rect x="-50" y="-6" width="20" height="12" rx="2"/>
        <rect x="30" y="-6" width="20" height="12" rx="2"/>
        <rect x="-6" y="-50" width="12" height="20" rx="2" transform="rotate(45)"/>
        <rect x="-6" y="30" width="12" height="20" rx="2" transform="rotate(45)"/>
        <rect x="-50" y="-6" width="20" height="12" rx="2" transform="rotate(45)"/>
        <rect x="30" y="-6" width="20" height="12" rx="2" transform="rotate(45)"/>
      </g>
    </g>
    <circle cx="0" cy="0" r="17" fill="#f3f4f6"/>
    <path d="M 0 -11 A 11 11 0 1 0 11 0" fill="none" stroke="#9a9da3" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- WZ wordmark -->
  <g font-family="'Montserrat','Arial Narrow',sans-serif" font-weight="800">
    <text x="185" y="135" font-size="150" letter-spacing="-4" fill="url(#wzInk)">W</text>
    <text x="345" y="135" font-size="150" letter-spacing="-4" fill="url(#wzSilver)">Z</text>
  </g>

  <!-- MONTAGENS -->
  <text x="190" y="215" font-family="'Montserrat',Arial,sans-serif" font-weight="500"
        font-size="58" letter-spacing="6" fill="url(#wzInk)">MONTAGENS</text>
</svg>
