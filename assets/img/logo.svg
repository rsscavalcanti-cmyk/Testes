<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" role="img" aria-label="WZ Montagens">
  <defs>
    <linearGradient id="zSilver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd2d8"/>
      <stop offset="100%" stop-color="#6b6f77"/>
    </linearGradient>
  </defs>

  <!-- Mark: gear + rotation arrows -->
  <g transform="translate(40,40) scale(1.0)" fill="none" stroke="#8a8d92" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(100,100)">
      <g id="t"><rect x="-9" y="-78" width="18" height="22" rx="3" fill="#8a8d92" stroke="none"/></g>
      <use href="#t" transform="rotate(45)"/><use href="#t" transform="rotate(90)"/><use href="#t" transform="rotate(135)"/>
      <use href="#t" transform="rotate(180)"/><use href="#t" transform="rotate(225)"/><use href="#t" transform="rotate(270)"/><use href="#t" transform="rotate(315)"/>
      <circle r="58"/><circle r="40"/>
      <path d="M 14 -2 A 16 16 0 1 0 8 11"/>
    </g>
    <g stroke-width="5">
      <path d="M 38 70 A 66 66 0 0 1 120 26"/><path d="M 120 26 L 108 22 M 120 26 L 116 38"/>
      <path d="M 162 130 A 66 66 0 0 1 80 174"/><path d="M 80 174 L 92 178 M 80 174 L 84 162"/>
    </g>
  </g>

  <!-- Wordmark (serif). Fonte real indisponível como asset: usa serifada de alto contraste. -->
  <g font-family="'Didot','Bodoni MT','Playfair Display',Georgia,'Times New Roman',serif">
    <text x="280" y="190" font-size="180" font-weight="700" letter-spacing="6" fill="#0e0f12">W<tspan fill="url(#zSilver)">Z</tspan></text>
    <text x="285" y="270" font-family="'Cinzel','Trajan Pro',Georgia,serif" font-size="66" font-weight="600" letter-spacing="16" fill="#0e0f12">MON<tspan fill="#9a9da3">T</tspan>AGENS</text>
  </g>
</svg>
