<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="Quadro Geral de Baixa Tensão - ilustração">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cfd2d8"/>
      <stop offset="50%" stop-color="#eef0f3"/>
      <stop offset="100%" stop-color="#c2c5cc"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d7dade"/>
      <stop offset="50%" stop-color="#f4f6f8"/>
      <stop offset="100%" stop-color="#cbced4"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" fill="#11141a"/>
  <!-- cabinet body -->
  <rect x="70" y="30" width="340" height="300" rx="6" fill="url(#metal)" stroke="#9aa0a8" stroke-width="2"/>
  <!-- three sections -->
  <g stroke="#aeb3bb" stroke-width="2">
    <rect x="84" y="46" width="100" height="268" rx="4" fill="url(#door)"/>
    <rect x="190" y="46" width="100" height="268" rx="4" fill="url(#door)"/>
    <rect x="296" y="46" width="100" height="268" rx="4" fill="url(#door)"/>
  </g>
  <!-- breakers / components -->
  <g fill="#3a3d44">
    <rect x="98" y="64" width="72" height="40" rx="3"/>
    <rect x="98" y="116" width="72" height="22" rx="3" fill="#5b5e66"/>
    <rect x="98" y="146" width="72" height="22" rx="3" fill="#5b5e66"/>
    <rect x="204" y="64" width="72" height="30" rx="3"/>
  </g>
  <!-- multimeter -->
  <rect x="204" y="106" width="72" height="48" rx="4" fill="#0e0f12"/>
  <rect x="212" y="114" width="56" height="22" rx="2" fill="#16a34a" opacity="0.85"/>
  <text x="240" y="131" text-anchor="middle" font-family="monospace" font-size="14" fill="#062b13">220V</text>
  <!-- pilot lights -->
  <circle cx="320" cy="74" r="9" fill="#22c55e"/>
  <circle cx="350" cy="74" r="9" fill="#eab308"/>
  <circle cx="380" cy="74" r="9" fill="#ef4444"/>
  <!-- DIN rows -->
  <g fill="#6b7078">
    <rect x="310" y="108" width="76" height="16" rx="2"/>
    <rect x="310" y="132" width="76" height="16" rx="2"/>
    <rect x="310" y="156" width="76" height="16" rx="2"/>
    <rect x="98" y="190" width="72" height="14" rx="2"/>
    <rect x="98" y="210" width="72" height="14" rx="2"/>
    <rect x="204" y="178" width="72" height="14" rx="2"/>
    <rect x="204" y="198" width="72" height="14" rx="2"/>
  </g>
  <!-- handles -->
  <g fill="#3a3d44">
    <rect x="176" y="160" width="6" height="44" rx="3"/>
    <rect x="282" y="160" width="6" height="44" rx="3"/>
    <rect x="388" y="160" width="6" height="44" rx="3"/>
  </g>
  <!-- base plinth -->
  <rect x="78" y="330" width="324" height="14" rx="3" fill="#23262c"/>
</svg>
