name: Deploy site WZ Montagens (GitHub Pages)

on:
  push:
    branches: ["claude/wz-paineis-website-klfxub"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
